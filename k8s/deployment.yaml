apiVersion: v1
kind: Namespace
metadata:
  name: nb-im

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nb-im-config
  namespace: nb-im
data:
  application.yml: |
    server:
      port: 8080

    netty:
      port: 8080
      boss-threads: 1
      worker-threads: 0
      heartbeat-timeout: 60

    redis:
      host: redis-service
      port: 6379

    kafka:
      servers: kafka-service:9092

    monitoring:
      admin-port: 8081

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nb-im-gateway
  namespace: nb-im
  labels:
    app: nb-im
    component: gateway
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nb-im
      component: gateway
  template:
    metadata:
      labels:
        app: nb-im
        component: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8081"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: nb-im
        image: nb-im:1.0.0
        imagePullPolicy: IfNotPresent
        ports:
        - name: im-port
          containerPort: 8080
          protocol: TCP
        - name: admin-port
          containerPort: 8081
          protocol: TCP
        env:
        - name: REDIS_HOST
          value: redis-service
        - name: REDIS_PORT
          value: "6379"
        - name: KAFKA_SERVERS
          value: kafka-service:9092
        - name: SERVER_PORT
          value: "8080"
        - name: ADMIN_API_PORT
          value: "8081"
        - name: JAVA_OPTS
          value: "-Xms2g -Xmx2g -XX:+UseG1GC -XX:MaxGCPauseMillis=100"
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: logs
          mountPath: /app/logs
      volumes:
      - name: logs
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - nb-im
              topologyKey: kubernetes.io/hostname

---
apiVersion: v1
kind: Service
metadata:
  name: nb-im-service
  namespace: nb-im
  labels:
    app: nb-im
    component: gateway
spec:
  type: LoadBalancer
  ports:
  - name: im-port
    port: 8080
    targetPort: 8080
    protocol: TCP
  - name: admin-port
    port: 8081
    targetPort: 8081
    protocol: TCP
  selector:
    app: nb-im
    component: gateway

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: nb-im-hpa
  namespace: nb-im
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: nb-im-gateway
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 60

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nb-im-pdb
  namespace: nb-im
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: nb-im
      component: gateway
